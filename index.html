<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #0842A0; 
            --hover: #1CA2D2;   
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
       .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding-top: 0px;
            padding-right: 20px;
            padding-bottom: 30px; 
            padding-left: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header-img {
            max-width: 100%; 
            height: auto;
            margin: 0 auto 10px auto;
            display: block;
            pointer-events: none;       
            user-select: none;          
            -webkit-user-select: none;  
            -webkit-user-drag: none;    
            -webkit-touch-callout: none;
        }

        h2 { color: Black; margin-top: 0; font-size: 1.4em; }
        #reader { width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        
        #reader button {
            background-color: #0842A0 !important;
            color: white !important;
            border: none !important;
            padding: 10px 15px !important;
            border-radius: 6px !important;
            font-size: 1em !important;
            font-weight: bold !important;
            cursor: pointer !important;
            margin: 10px 5px !important;
            transition: 0.3s !important; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
        }
        #reader button:hover { background-color: #1CA2D2 !important; }
        #reader a { color: #0842A0 !important; text-decoration: none !important; font-weight: bold !important; }

        .user-card { display: none; margin-top: 20px; text-align: left; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .data-label { font-weight: bold; color: #666; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; font-weight: bold; color: white; }
        .bg-red { background: #e74c3c; }
        .bg-green { background: #2ecc71; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 6px;
            font-size: 1em; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        
        /* BUTTON COLORS */
        .btn-paid { background: #3498db; }
        .btn-unpaid { background: #e74c3c; } 
        
        .btn-lanyard { background: #2F3C42; }
        .btn-unclaimed { background: #e67e22; } 
        
        .btn-next { background: Black; width: 100%; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- NEW POPUP STYLES --- */
        .popup-overlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }
        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 80%;
        }
        .popup-icon { font-size: 3rem; margin-bottom: 10px; }
        .popup-content h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.5em; }
        .popup-content p { margin: 0; color: #555; font-size: 1em; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="header.png" alt="ELITES Logo" class="header-img" draggable="false">
    <h2>ELITES QR Scanner</h2>
    
    <div id="scanner-view">
        <div id="reader"></div>
        <p style="text-align:center; font-size: 0.9em; color:#777;">Scan QR or Upload Image</p>
    </div>

    <div id="user-card" class="user-card">
        <h3 style="text-align:center; border-bottom: 2px solid #eee; padding-bottom:10px; color: #0842A0;">Attendee Info</h3>
        
        <div class="data-row"><span class="data-label">Reg No:</span> <span id="val-reg"></span></div>
        <div class="data-row"><span class="data-label">Status:</span> <span id="val-status"></span></div>
        <div class="data-row"><span class="data-label">Name:</span> <span id="val-name"></span></div>
        <div class="data-row"><span class="data-label">Student No:</span> <span id="val-studentNum"></span></div>
        <div class="data-row"><span class="data-label">Program & Yr:</span> <span id="val-program"></span></div>
        <div class="data-row"><span class="data-label">Age / Sex:</span> <span id="val-ageSex"></span></div>
        <div class="data-row"><span class="data-label">Discount:</span> <span id="val-merch"></span></div>

        <div class="btn-group">
            <button class="btn-paid" id="btn-paid">Loading...</button>
            <button class="btn-lanyard" id="btn-lanyard">Loading...</button>
        </div>
        <button class="btn-next" onclick="resetScanner()">Scan Next</button>
    </div>
</div>

<!-- --- NEW CUSTOM POPUP UI --- -->
<div id="custom-popup" class="popup-overlay">
    <div class="popup-content">
        <div id="popup-icon" class="popup-icon">✅</div>
        <h3 id="popup-title">Success!</h3>
        <p id="popup-message">Data saved successfully.</p>
    </div>
</div>

<script>
    // 🔴 YOUR GOOGLE WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6OfzYJ-QCGP_y-dXCJCryck9STqWYfK_1Vd6qEQJ00OfWM6HKydueW0MlsZRcpoCpyA/exec";
    
    let html5QrcodeScanner;
    let currentRegNum = "";
    
    let isProcessing = false; 
    let initialStatus = "";
    let currentStatus = "";

    function startScanner() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let config = { fps: 10, qrbox: {width: 250, height: 250} };
        if (isMobile) { config.videoConstraints = { facingMode: "environment" }; }

        html5QrcodeScanner = new Html5QrcodeScanner("reader", config, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 
        isProcessing = true; 
        
        playBeep(); 
        currentRegNum = decodedText;
        fetchUserData(decodedText);
    }

    function onScanFailure(error) { /* Ignore background scanning errors */ }

    async function fetchUserData(regNum) {
        document.getElementById('scanner-view').style.display = 'none';
        document.getElementById('user-card').style.display = 'block';
        document.getElementById('val-name').innerText = "Loading...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getUser", regNum: regNum })
            });
            const data = await response.json();

            if (data.success) {
                initialStatus = data.status; 
                currentStatus = data.status; 
                populateCard(data);
            } else {
                alert("Registration Number not found!");
                quickReset();
            }
        } catch (error) {
            alert("Connection error. Check console.");
            console.error(error);
        }
    }

    function populateCard(data) {
        document.getElementById('val-reg').innerText = data.regNumber;
        document.getElementById('val-name').innerText = data.name;
        document.getElementById('val-studentNum').innerText = data.studentNum;
        document.getElementById('val-program').innerText = data.programLevel;
        document.getElementById('val-ageSex').innerText = `${data.age} / ${data.sex}`;
        
        const statusSpan = document.getElementById('val-status');
        statusSpan.innerText = data.status;
        statusSpan.className = data.status === "Registered" ? "badge bg-green" : "badge bg-red";
        
        const btnPaid = document.getElementById('btn-paid');
        btnPaid.disabled = false;
        if (data.status === "Registered") {
            btnPaid.innerText = "Mark Unpaid";
            btnPaid.className = "btn-unpaid";
            btnPaid.onclick = () => updateAction('toggleStatus', btnPaid);
        } else {
            btnPaid.innerText = "Mark Paid";
            btnPaid.className = "btn-paid";
            btnPaid.onclick = () => updateAction('toggleStatus', btnPaid);
        }

        const merchSpan = document.getElementById('val-merch');
        merchSpan.innerText = data.merch;
        merchSpan.className = data.merch === "Claimed" ? "badge bg-red" : "badge bg-green";
        
        const btnLanyard = document.getElementById('btn-lanyard');
        btnLanyard.disabled = false;
        if (data.merch === "Claimed") {
            btnLanyard.innerText = "Undo Claim";
            btnLanyard.className = "btn-unclaimed";
            btnLanyard.onclick = () => updateAction('toggleMerch', btnLanyard);
        } else {
            btnLanyard.innerText = "Claim Discount";
            btnLanyard.className = "btn-lanyard";
            btnLanyard.onclick = () => updateAction('toggleMerch', btnLanyard);
        }
    }

    async function updateAction(actionType, btnElement) {
        btnElement.innerText = "Wait...";
        btnElement.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: actionType, regNum: currentRegNum })
            });
            const data = await response.json();
            
            if (data.success) {
                if (actionType === 'toggleStatus') { currentStatus = data.newStatus; }
                fetchUserData(currentRegNum); 
            }
        } catch (error) {
            alert("Failed to update.");
            btnElement.disabled = false;
        }
    }

    // --- NEW SMOOTH RESET FUNCTION ---
    function resetScanner() {
        const hasStatusChanged = (initialStatus !== currentStatus);
        
        // 1. Trigger the background email if needed
        if (hasStatusChanged) {
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "sendEmail", regNum: currentRegNum })
            }).catch(e => console.error("Email failed to send"));
        }
        
        // 2. Setup the Pop-up Content
        const popup = document.getElementById('custom-popup');
        const icon = document.getElementById('popup-icon');
        const title = document.getElementById('popup-title');
        const message = document.getElementById('popup-message');

        if (hasStatusChanged) {
            icon.innerText = "✅";
            title.innerText = "Changes Saved!";
            message.innerText = "Status updated & email triggered.";
        } else {
            icon.innerText = "📷";
            title.innerText = "Ready!";
            message.innerText = "Scanning next attendee...";
        }

        // 3. Show the Pop-up
        popup.style.display = 'flex';

        // 4. Hide the pop-up after 1.2 seconds, then reset UI
        setTimeout(() => {
            popup.style.display = 'none';
            document.getElementById('user-card').style.display = 'none';
            document.getElementById('scanner-view').style.display = 'block';
            
            // Re-enable camera scanning shortly after UI switches
            setTimeout(() => { isProcessing = false; }, 500); 
        }, 1200); 
    }

    // Backup reset for errors
    function quickReset() {
        document.getElementById('user-card').style.display = 'none';
        document.getElementById('scanner-view').style.display = 'block';
        isProcessing = false;
    }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.frequency.value = 800; 
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }

    window.onload = startScanner;
</script>
</body>
</html>
