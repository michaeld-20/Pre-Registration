<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            /* Your custom ELITES colors */
            --primary: #0842A0; 
            --hover: #1CA2D2;   
            --bg: #f4f7f6;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
       .container {
            width: 100%;
            max-width: 500px;
            background: white;
            /* Explicitly defining each side: */
            padding-top: 0px;
            padding-right: 20px;
            padding-bottom: 30px; /* Adjust this value for more/less space */
            padding-left: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        /* Styling for your header.png */
        .header-img {
            max-width: 100%; /* Adjust this if the image is too big/small */
            height: auto;
            margin: 0 auto 10px auto;
            display: block;
        }

        h2 { color: Black; margin-top: 0; font-size: 1.4em; }
        
        #reader { width: 100%; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        
        /* OVERRIDE QR LIBRARY DEFAULT BUTTONS */
        #reader button {
            background-color: var(--primary) !important;
            color: white !important;
            border: none !important;
            padding: 10px 15px !important;
            border-radius: 6px !important;
            font-size: 1em !important;
            font-weight: bold !important;
            cursor: pointer !important;
            margin: 10px 5px !important;
            transition: 0.3s !important; /* Smooth color transition */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
        }
        
        /* The hover effect using your specific light blue */
        #reader button:hover { 
            background-color: var(--hover) !important; 
        }
        
        #reader a { color: var(--primary) !important; text-decoration: none !important; font-weight: bold !important; }

        .user-card { display: none; margin-top: 20px; text-align: left; /* Keeps user data left-aligned */ }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .data-label { font-weight: bold; color: #666; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85em; font-weight: bold; color: white; }
        .bg-red { background: #e74c3c; }
        .bg-green { background: #2ecc71; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 6px;
            font-size: 1em; font-weight: bold; cursor: pointer; color: white; transition: 0.2s;
        }
        .btn-paid { background: #3498db; }
        .btn-lanyard { background: #9b59b6; }
        .btn-next { background: Black; width: 100%; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <img src="header.png" alt="ELITES Logo" class="header-img">
    <h2>ELITES QR Scanner</h2>
    
    <div id="scanner-view">
        <div id="reader"></div>
        <p style="text-align:center; font-size: 0.9em; color:#777;">Scan QR or Upload Image</p>
    </div>

    <div id="user-card" class="user-card">
        <h3 style="text-align:center; border-bottom: 2px solid #eee; padding-bottom:10px; color: #0842A0;">Attendee Info</h3>
        
        <div class="data-row"><span class="data-label">Reg No:</span> <span id="val-reg"></span></div>
        <div class="data-row"><span class="data-label">Status:</span> <span id="val-status"></span></div>
        <div class="data-row"><span class="data-label">Name:</span> <span id="val-name"></span></div>
        <div class="data-row"><span class="data-label">Student No:</span> <span id="val-studentNum"></span></div>
        <div class="data-row"><span class="data-label">Program & Yr:</span> <span id="val-program"></span></div>
        <div class="data-row"><span class="data-label">Age / Sex:</span> <span id="val-ageSex"></span></div>
        <div class="data-row"><span class="data-label">Discount:</span> <span id="val-merch"></span></div>

        <div class="btn-group">
            <button class="btn-paid" id="btn-paid" onclick="updateAction('markPaid', this)">Mark Paid</button>
            <button class="btn-lanyard" id="btn-lanyard" onclick="updateAction('claimMerch', this)">Claim Lanyard</button>
        </div>
        <button class="btn-next" onclick="resetScanner()">Scan Next</button>
    </div>
</div>

<script>
    // 🔴 REPLACE THIS WITH YOUR GOOGLE WEB APP URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6OfzYJ-QCGP_y-dXCJCryck9STqWYfK_1Vd6qEQJ00OfWM6HKydueW0MlsZRcpoCpyA/exec";
    
    let html5QrcodeScanner;
    let currentRegNum = "";

    // Initialize Scanner
    function startScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.clear(); // Stop scanning immediately
        playBeep(); // Audio feedback
        currentRegNum = decodedText;
        fetchUserData(decodedText);
    }

    function onScanFailure(error) { /* Ignore background scanning errors */ }

    // Fetch Data from Google Sheets
    async function fetchUserData(regNum) {
        document.getElementById('scanner-view').style.display = 'none';
        document.getElementById('user-card').style.display = 'block';
        document.getElementById('val-name').innerText = "Loading...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getUser", regNum: regNum })
            });
            const data = await response.json();

            if (data.success) {
                populateCard(data);
            } else {
                alert("Registration Number not found!");
                resetScanner();
            }
        } catch (error) {
            alert("Connection error. Check console.");
            console.error(error);
        }
    }

    // Update UI with fetched data
    function populateCard(data) {
        document.getElementById('val-reg').innerText = data.regNumber;
        document.getElementById('val-name').innerText = data.name;
        document.getElementById('val-studentNum').innerText = data.studentNum;
        document.getElementById('val-program').innerText = data.programLevel;
        document.getElementById('val-ageSex').innerText = `${data.age} / ${data.sex}`;
        
        // Status Formatting
        const statusSpan = document.getElementById('val-status');
        statusSpan.innerText = data.status;
        statusSpan.className = data.status === "Registered" ? "badge bg-green" : "badge bg-red";
        document.getElementById('btn-paid').disabled = (data.status === "Registered");

        // Merch Formatting
        const merchSpan = document.getElementById('val-merch');
        merchSpan.innerText = data.merch;
        merchSpan.className = data.merch === "Available" ? "badge bg-green" : "badge bg-red";
        document.getElementById('btn-lanyard').disabled = (data.merch !== "Available");
    }

    // Send Update to Google Sheets (Paid or Merch)
    async function updateAction(actionType, btnElement) {
        btnElement.innerText = "Processing...";
        btnElement.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: actionType, regNum: currentRegNum })
            });
            const data = await response.json();
            
            if (data.success) {
                btnElement.innerText = "Done!";
                // Refresh data to show new statuses
                fetchUserData(currentRegNum); 
            }
        } catch (error) {
            alert("Failed to update.");
            btnElement.innerText = "Try Again";
            btnElement.disabled = false;
        }
    }

    function resetScanner() {
        document.getElementById('user-card').style.display = 'none';
        document.getElementById('scanner-view').style.display = 'block';
        
        // Reset Buttons
        document.getElementById('btn-paid').innerText = "Mark Paid";
        document.getElementById('btn-lanyard').innerText = "Claim Lanyard";
        
        startScanner();
    }

    function playBeep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.frequency.value = 800; // Hz
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }

    // Start on page load
    window.onload = startScanner;
</script>
</body>
</html>
